<!DOCTYPE html>
<html>
  <head>
    <title>View and Filter</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <script src="script.js"></script>
  </head>

  <body onload="init()">

    <div id="banner" class="container center">
      <div style="text-align:center">
        <h1>View / Filter Information</h1>
        <h2>School Bus Delays</h2>
      </div>
    </div>

    <div class="container subbanner">
      <div>
        <a class="button" href="index.html">Home</a>
        <a class="button" href="filter.html">View / Filter</a>
        <a class="button" href="analysis.html">Analysis</a>
      </div>
    </div>

    <div class="main">
      <h3>Bus Delay Cards</h3>

      <p>
        This page shows bus delay records in card form. You can search by borough
        or by status.
      </p>

      <hr>

      <h3 style="display:inline;">Search By Borough</h3>

      <input type="text" id="borough" placeholder="Brooklyn">

      <a class="button" onclick="filterByBorough()">Search</a>

      <hr>

      <h3 style="display:inline;">Search By Status</h3>

      <input type="text" id="status" placeholder="Running Late">

      <a class="button" onclick="filterByStatus()">Search</a>

      <a class="button" onclick="showAll()">Show All</a>

      <hr>
    </div>

    <div id="result" class="container">
    </div>

    <div id="output" class="container">
    </div>

    <div id="footer" class="container center">
      <h3>NYC Open Data Project</h3>
    </div>

  </body>
</html>
